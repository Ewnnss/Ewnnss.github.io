<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ewnnix | Logs & More</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-content">
            <img src="Ewnnixlogo.jpg" alt="Ewnnix Logo" class="logo-splash">
            <h1>Ewnnix</h1>
            <p>Choose your language / Choisissez votre langue</p>
            <div class="lang-buttons">
                <button onclick="setLanguage('fr')">🇫🇷 Français</button>
                <button onclick="setLanguage('en')">🇬🇧 English</button>
            </div>
        </div>
    </div>

    <!-- Contenu Principal -->
    <main id="main-content" class="hidden">
        <header>
            <div class="logo">Ewnnix</div>
            <div class="nav-right">
                <span class="badge" data-i18n="betaBadge">Bêta Privée</span>
                <button onclick="resetLanguage()" class="lang-switch">🌍</button>
            </div>
        </header>

        <section class="hero">
            <h1 data-i18n="heroTitle">La vision totale sur votre serveur.</h1>
            <p data-i18n="heroDesc">Un système de logs complet et de modération centralisée.</p>
            
            <div class="cta-box">
                <p data-i18n="ctaText">Pour obtenir l'accès, contactez le développeur en DM Discord :</p>
                <div class="discord-id-box">
                    <code>937006462927003728</code>
                    <button id="copy-btn" onclick="copyDiscordId()" data-i18n="copyBtn">Copier l'ID</button>
                </div>
            </div>
        </section>

        <footer>
            <p>© 2026 Ewnnix | Logs & More.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
